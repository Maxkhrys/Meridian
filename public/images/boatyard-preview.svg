<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" fill="none" role="img" aria-label="The Boat Yard Sauna website preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06100e"/>
      <stop offset="0.55" stop-color="#08161a"/>
      <stop offset="1" stop-color="#05100f"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientTransform="translate(1180 360) rotate(90) scale(360)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="780" x2="0" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e3a3a"/>
      <stop offset="1" stop-color="#06100e"/>
    </linearGradient>
    <linearGradient id="head" x1="120" y1="380" x2="120" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5fffb"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1180" cy="360" r="360" fill="url(#sun)"/>
  <circle cx="1180" cy="360" r="150" fill="none" stroke="#5eead4" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="1180" cy="360" r="210" fill="none" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="2"/>

  <!-- nav -->
  <text x="120" y="100" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#f5fffb" letter-spacing="2">THE BOAT YARD</text>
  <g font-family="Inter, sans-serif" font-size="20" fill="#cdeee6" opacity="0.85">
    <text x="940" y="98">Experience</text>
    <text x="1110" y="98">Locations</text>
    <text x="1260" y="98">Pricing</text>
  </g>
  <rect x="1380" y="70" width="120" height="44" rx="22" fill="url(#cta)"/>
  <text x="1440" y="98" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#05201c" text-anchor="middle">Book</text>

  <!-- hero copy -->
  <text x="118" y="300" font-family="'JetBrains Mono', monospace" font-size="22" fill="#5eead4" letter-spacing="6">WICKLOW · ARKLOW</text>
  <text x="120" y="440" font-family="Inter, sans-serif" font-size="120" font-weight="800" fill="url(#head)" letter-spacing="-2">Sea. Sauna.</text>
  <text x="120" y="560" font-family="Inter, sans-serif" font-size="120" font-weight="800" fill="url(#head)" letter-spacing="-2">Stillness.</text>
  <text x="124" y="630" font-family="Inter, sans-serif" font-size="26" fill="#bfe9df" opacity="0.85">A premium coastal wellness experience on the Irish Sea.</text>

  <rect x="120" y="680" width="210" height="64" rx="32" fill="url(#cta)"/>
  <text x="225" y="720" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#05201c" text-anchor="middle">Book a Session</text>
  <rect x="352" y="680" width="190" height="64" rx="32" fill="none" stroke="#5eead4" stroke-opacity="0.6" stroke-width="2"/>
  <text x="447" y="720" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#cdeee6" text-anchor="middle">Our Story</text>

  <!-- sauna barrels -->
  <g opacity="0.95">
    <rect x="1010" y="470" width="150" height="210" rx="60" fill="#0c2a2a" stroke="#5eead4" stroke-opacity="0.45" stroke-width="2"/>
    <rect x="1190" y="430" width="170" height="250" rx="70" fill="#0c2a2a" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="1085" cy="520" r="16" fill="#5eead4" fill-opacity="0.7"/>
    <circle cx="1275" cy="490" r="18" fill="#22d3ee" fill-opacity="0.6"/>
  </g>

  <!-- steam lines -->
  <g stroke="#a7f3d0" stroke-opacity="0.3" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M1060 460 q20 -30 0 -60 q-20 -30 0 -60"/>
    <path d="M1270 420 q22 -32 0 -64 q-22 -30 0 -62"/>
  </g>

  <!-- waves -->
  <path d="M0 820 C 260 770 480 880 760 830 C 1040 780 1320 880 1600 820 L1600 1000 L0 1000 Z" fill="url(#wave)"/>
  <path d="M0 860 C 280 820 520 920 800 870 C 1080 820 1340 910 1600 860" stroke="#5eead4" stroke-opacity="0.35" stroke-width="3" fill="none"/>
  <path d="M0 905 C 300 870 540 955 820 910 C 1100 866 1360 945 1600 905" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="3" fill="none"/>
</svg>
